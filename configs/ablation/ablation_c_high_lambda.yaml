seed: 42
device: "cuda:0"
num_workers: 4

e0_checkpoint: "artifacts/checkpoints/e0/best.pt"
train_index: "data/index/train.jsonl"
train_features: "artifacts/e0_features/train"
embedding_dim: 512
image_size: 224

resume_from: "artifacts/checkpoints/g_v2/best.pt"
allow_stage2_without_stage1_gate: true

amp: false

batch_size: 32
learning_rate: 0.0001
weight_decay: 0.01
grad_clip_norm: 1.0

generator:
  base_channels: 32
  channel_multipliers: [1, 2, 4, 4]
  cycle_steps_schedule: [4, 8, 16]
  condition_dim: 512
  sample_steps: 32
  train_cycle_steps: 4
  sampler: "heun"

validation:
  enabled: true
  index: "data/index/val.jsonl"
  features: "artifacts/e0_features/val"
  batch_size: 16
  max_samples: 128
  face_detection:
    enabled: true
    model_name: "buffalo_l"

stages:
  stage1:
    epochs: 0
    require_face_detection_gate: false
  stage2:
    epochs: 15
    lambda_initial: 0.05
    lambda_max: 0.05
    lambda_growth: 0.0
    gradient_conflict:
      enabled: false

out_dir: "artifacts/ablation/ablation_c_high_lambda"
