# medium_v1 G Stage 2 M1: uncertainty-weighted flow/cycle losses.
seed: 1337
sampling_seed: 1337
device: cuda:0
num_workers: 8
batch_size: 16
learning_rate: 0.0003
weight_decay: 0.0
image_size: 224
embedding_dim: 512
train_index: data/index/train_balanced_medium.jsonl
train_features: artifacts/e0_features/train_balanced_medium
e0_checkpoint: artifacts/checkpoints/e0_medium_v1/best.pt
out_dir: artifacts/checkpoints/g_medium_v1_stage2_m1_uw
resume_from: artifacts/checkpoints/g_medium_v1_stage1_m0/best_single_face.pt
allow_stage2_without_stage1_gate: true
resume_from_legacy_stage1_metrics: false
loss_weighting:
  type: uncertainty
  calibration_batches: 20
  log_var_lr: 0.0001
  log_var_weight_decay: 0.0
ema:
  enabled: true
  decay: 0.999
  evaluate_raw: true
  evaluate_ema: true
  save_ema_checkpoint: true
best_model: raw
distributed:
  backend: gloo
generator:
  model_type: conditional_flow_matching
  base_channels: 32
  channel_multipliers: [1, 2, 4, 4]
  time_embedding_dim: 128
  condition_dim: 512
  sample_steps: 32
  train_cycle_steps: 16
  cycle_steps_schedule: []
  sampler: heun
grad_clip_norm: 1.0
stages:
  stage1:
    epochs: 0
    require_face_detection_gate: false
  stage2:
    epochs: 80
    lambda_initial: 0.01
    lambda_max: 0.01
    lambda_growth: 0
    gradient_conflict:
      enabled: true
      interval: 50
    quality_eval:
      enabled: false
      interval: 10
      real_index: data/index/val_single_face.jsonl
      generated_dir: artifacts/eval/g_medium_v1_stage2/raw_generated
      output_dir: artifacts/eval/g_medium_v1_stage2/quality
      model: raw
validation:
  enabled: true
  index: data/index/val_single_face.jsonl
  features: artifacts/e0_features/val_single_face
  max_samples: 512
  batch_size: 16
  face_detection:
    enabled: true
    model_name: buffalo_l
