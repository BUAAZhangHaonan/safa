# Reproducible V2-best recipe: Stage 2 from a clean Stage 1 checkpoint,
# with fixed low cycle lambda and aligned training/inference step counts.
#
# The resume checkpoint below is a prerequisite output, not a fallback.
# Produce it first with the same ch=32 generator Stage 1 recipe, then run
# this Stage 2 config. Do not replace it with artifacts/checkpoints/g_v2/best.pt
# or any other Stage 2 best checkpoint.
seed: 1337
sampling_seed: 1337
device: cuda:0
num_workers: 8
batch_size: 16
learning_rate: 0.0003
weight_decay: 0.0
image_size: 224
embedding_dim: 512
train_index: data/index/train.jsonl
train_features: artifacts/e0_features/train
e0_checkpoint: artifacts/checkpoints/e0/best.pt
out_dir: artifacts/checkpoints/g_v2_best
resume_from: artifacts/checkpoints/g_v2_best_stage1/best_stage1.pt
allow_stage2_without_stage1_gate: true
distributed:
  backend: gloo
generator:
  model_type: conditional_flow_matching
  base_channels: 32
  channel_multipliers: [1, 2, 4, 4]
  time_embedding_dim: 128
  condition_dim: 512
  sample_steps: 32
  train_cycle_steps: 4
  cycle_steps_schedule: [4, 8, 16, 32]
  sampler: heun
grad_clip_norm: 1.0
stages:
  stage1:
    epochs: 0
    require_face_detection_gate: false
  stage2:
    epochs: 80
    lambda_initial: 0.01
    lambda_max: 0.01
    lambda_growth: 0
    gradient_conflict:
      enabled: true
      interval: 50
validation:
  enabled: true
  index: data/index/val.jsonl
  features: artifacts/e0_features/val
  max_samples: 512
  batch_size: 16
  face_detection:
    enabled: true
    model_name: buffalo_l
